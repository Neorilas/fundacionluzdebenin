services:

  # ── Backend API + Panel Admin ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://${DOMAIN}
      UPLOAD_DIR: /app/uploads
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      FRONTEND_INTERNAL_URL: http://frontend:3000
      REVALIDATE_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY}
      MAILCHIMP_AUDIENCE_ID: ${MAILCHIMP_AUDIENCE_ID}
      MAILCHIMP_SERVER: ${MAILCHIMP_SERVER}
    volumes:
      - sqlite_data:/data          # Base de datos SQLite persistente
      - uploads_data:/app/uploads  # Imágenes subidas persistentes
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend Web (Next.js standalone) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
    restart: unless-stopped
    environment:
      # Runtime env vars (not baked at build time)
      API_INTERNAL_URL: http://backend:3001
      REVALIDATE_SECRET: ${JWT_SECRET}
    expose:
      - "3000"
    depends_on:
      - backend

# NOTA: El proxy inverso + SSL lo gestiona un Caddy COMPARTIDO entre proyectos
# (contenedor `caddy`), cuyo Caddyfile enruta fundacionluzdebenin.org hacia
# fundacion-backend-1:3001 (api/admin/uploads) y fundacion-frontend-1:3000.
# Por eso este compose ya NO define su propio servicio caddy: chocaba con el
# puerto 80/443 del Caddy compartido y hacia fallar el deploy.

volumes:
  sqlite_data:
  uploads_data:
