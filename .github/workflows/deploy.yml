name: Deploy to Hetzner

# Se ejecuta automáticamente en cada push a master
# También se puede lanzar manualmente desde GitHub → Actions → "Run workflow"
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Unit tests
        run: npm test
        working-directory: backend

  # ── 2. Deploy (solo si tests pasan) ───────────────────────────────────────
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.107.235.70
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "Desplegando Fundacion Luz de Benin..."
            cd /root/fundacion
            git pull --ff-only
            bash scripts/update.sh
            echo "Despliegue completado"
